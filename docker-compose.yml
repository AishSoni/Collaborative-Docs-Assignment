services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ajaia
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./apps/api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ajaia?schema=public
      PORT: "3001"
      LOG_LEVEL: info
      MAX_UPLOAD_BYTES: "2000000"
      CORS_ORIGIN: http://localhost:3000
      SEED_ON_BOOT: "true"
    ports:
      - "3001:3001"

  web:
    build: ./apps/web
    depends_on:
      - api
    environment:
      API_BASE_URL: http://localhost:3001
    ports:
      - "3000:3000"

volumes:
  pgdata: {}
